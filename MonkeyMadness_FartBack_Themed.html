<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const W=480,H=760; canvas.width=W; canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=W*s+'px';canvas.style.height=H*s+'px';}
resize(); window.addEventListener('resize',resize);

// ---------- layout ----------
const CTRL_TOP=H-120, GROUND_Y=CTRL_TOP-42, PLAYER_GY=GROUND_Y-26, LIVES_MAX=4;
const BRANCH_Y=42;
const GRAV=1500, JUMP=-660, PSPEED=305;
const GAS_MAX=100, BLAST_COST=34, GAS_RECHARGE=30;
const BARRIER_T=0.5, SLIP_T=1.2, PEEL_LIFE=5, PEEL_R=20;
const PU_SHIELD=6, PU_X2=8, PU_SLOW=4, PU_DROP_LIFE=7, PU_FREE=4.5;
const PU_COLORS={mask:'#25d4e8',gold:'#ffe234',plug:'#b06bff',beano:'#93e552',bean:'#ffab2e',mega:'#ff4db8'};
const R=(a,b)=>a+Math.random()*(b-a);

// ============================================================
// THEMES  — art direction is data + a few style flags.
// Add a new world by adding an entry here; nothing else changes.
// ============================================================
const THEMES={
  loud:{
    name:'LOUD!', icon:'💥',
    bg:'halftone', bgBase:'#2a1857', bgDot:'#ff3d7f', bgDotSize:16,
    ground:'#17d1e8', groundEdge:'#0fb0c6',
    outline:'#000000', outlineW:5,
    monkeyBody:'#8a4bd6', monkeyFace:'#ffe022', ear:'#7a3ec6',
    playerBody:'#17d1e8', playerSkin:'#ffb0c7',
    banana:'#ffe022', bananaTip:'#e0b800',
    fart:'#7CFF5A', fartRing:'#c8ffb0',
    eye:'dot',
    text:'#ffffff', accent:'#ffe022', panel:'rgba(43,24,87,.92)', border:'#ff3d7f',
    titleFont:(s)=>`900 italic ${s}px "Arial Black",Impact,sans-serif`,
    hudFont:(s)=>`900 ${s}px "Arial Black",Impact,sans-serif`,
    stickers:true,
    sound:{throw:{freq:150,dur:.2,flutter:24,cutoff:1500,gain:.32,type:'sawtooth'},
           jump:{freq:250,dur:.14,flutter:30,cutoff:1900,gain:.28,type:'square'},
           blast:{freq:90,dur:.4,flutter:16,cutoff:1300,gain:.5,type:'sawtooth'}, airhorn:true}
  },
  doodle:{
    name:'Doodle', icon:'🖍️',
    bg:'paper', bgBase:'#fbf7ea', rule:'#cfe0ef', margin:'#e8907f',
    ground:'#8fca6a', groundEdge:'#5a9a3a',
    outline:'#5a3a17', outlineW:3,
    monkeyBody:'#a06a34', monkeyFace:'#d0a468', ear:'#8a5a2b',
    playerBody:'#e24b3a', playerSkin:'#f4c9a0',
    banana:'#f4c020', bananaTip:'#b98a00',
    fart:'#8fca6a', fartRing:'#c3e6a6',
    eye:'googly',
    text:'#3a2a17', accent:'#e24b3a', panel:'rgba(251,247,234,.95)', border:'#3f6fd1',
    titleFont:(s)=>`700 ${s}px "Comic Sans MS","Chalkboard SE","Bradley Hand",cursive`,
    hudFont:(s)=>`700 ${s}px "Comic Sans MS","Chalkboard SE",cursive`,
    wobble:true,
    sound:{throw:{freq:300,dur:.17,flutter:34,cutoff:2200,gain:.24,type:'square'},
           jump:{freq:430,dur:.12,flutter:36,cutoff:2600,gain:.22,type:'square'},
           blast:{freq:210,dur:.3,flutter:26,cutoff:1800,gain:.34,type:'square'}}
  },
  ink:{
    name:'Inkwell', icon:'🎩',
    bg:'inkpaper', bgBase:'#efe4c6',
    ground:'#181410', groundEdge:'#2a2016',
    outline:'#181410', outlineW:3,
    monkeyBody:'#181410', monkeyFace:'#efe4c6', ear:'#181410',
    playerBody:'#181410', playerSkin:'#efe4c6',
    banana:'#d7a52c', bananaTip:'#8a6410',
    fart:'#fffef0', fartRing:'#ffffff',
    eye:'pie',
    text:'#efe4c6', accent:'#d7a52c', panel:'rgba(24,20,16,.92)', border:'#d7a52c',
    titleFont:(s)=>`800 italic ${s}px Georgia,"Times New Roman",serif`,
    hudFont:(s)=>`700 ${s}px Georgia,serif`,
    grain:true, vignette:true, smokeRings:true,
    sound:{throw:{freq:110,dur:.26,flutter:14,cutoff:820,gain:.34,type:'sawtooth'},
           jump:{freq:170,dur:.16,flutter:16,cutoff:1000,gain:.28,type:'triangle'},
           blast:{freq:68,dur:.5,flutter:11,cutoff:700,gain:.5,type:'sawtooth'}}
  },
  clay:{
    name:'Plasticine', icon:'🟤',
    bg:'clay', bgTop:'#f0e4cf', bgBot:'#c9b088',
    ground:'#b98f5f', groundEdge:'#9a7145',
    outline:'#5a3e22', outlineW:0,
    monkeyBody:'#8a6038', monkeyFace:'#b98a5b', ear:'#7a5330',
    playerBody:'#3fa39a', playerSkin:'#e6b487',
    banana:'#f0c53d', bananaTip:'#c99a1e',
    fart:'#bfe6a0', fartRing:'#d8f0c4',
    eye:'clay',
    text:'#4a3320', accent:'#2c7d75', panel:'rgba(238,226,204,.96)', border:'#c99a1e',
    titleFont:(s)=>`800 ${s}px "SF Pro Rounded","Arial Rounded MT Bold","Trebuchet MS",sans-serif`,
    hudFont:(s)=>`700 ${s}px "Trebuchet MS",sans-serif`,
    clayShadow:true, highlight:true,
    sound:{throw:{freq:130,dur:.2,flutter:18,cutoff:900,gain:.3,type:'sawtooth',wet:true},
           jump:{freq:200,dur:.13,flutter:20,cutoff:1100,gain:.26,type:'sawtooth',wet:true},
           blast:{freq:80,dur:.4,flutter:13,cutoff:800,gain:.46,type:'sawtooth',wet:true}}
  }
};
const THEME_ORDER=['loud','doodle','ink','clay'];
let themeId='loud';
try{ const s=localStorage.getItem('mm_theme'); if(s&&THEMES[s]) themeId=s; }catch(e){}
let T=THEMES[themeId];

// cached background patterns (rebuilt on theme change)
let patHalftone=null, patGrain=null;
function buildPatterns(){
  patHalftone=null; patGrain=null;
  if(T.bg==='halftone'){
    const c=document.createElement('canvas'); c.width=c.height=T.bgDotSize;
    const g=c.getContext('2d'); g.fillStyle=T.bgDot; g.beginPath();
    g.arc(T.bgDotSize/2,T.bgDotSize/2,T.bgDotSize*0.22,0,6.28); g.fill();
    patHalftone=ctx.createPattern(c,'repeat');
  }
  if(T.grain){
    const c=document.createElement('canvas'); c.width=c.height=72;
    const g=c.getContext('2d'), id=g.createImageData(72,72);
    for(let i=0;i<id.data.length;i+=4){const v=Math.random()*255;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=18;}
    g.putImageData(id,0,0); patGrain=ctx.createPattern(c,'repeat');
  }
}
function setTheme(id){ themeId=id; T=THEMES[id]; try{localStorage.setItem('mm_theme',id);}catch(e){} buildPatterns(); }
buildPatterns();

// ============================================================
// STATE
// ============================================================
const ST={START:0,PLAY:1,LEVELDONE:2,BOSS:3,WIN:4,OVER:5};
const LEVELS=[{secs:9,monkeys:1},{secs:10,monkeys:1},{secs:11,monkeys:1},{secs:12,monkeys:2},{secs:12,monkeys:2},{secs:13,monkeys:2},{secs:13,monkeys:3},{secs:14,monkeys:3},{secs:15,monkeys:3},{secs:16,monkeys:4}];
let st=ST.START, lives, score, best=0, combo, comboBestRun, gameT, tipT, lastTs=0, level=1, levelT=0, boss=null;
try{best=parseInt(localStorage.getItem('fartback_best')||'0',10)||0;}catch(e){}
let monkeys=[],bananas=[],particles=[],clouds=[],floaters=[],peels=[],pops=[],powerups=[],stars=[];
let shakeT=0,shakeMag=0,flashT=0,flashCol='#fff',hitstop=0;
const P={x:W/2,y:PLAYER_GY,vy:0,onGround:true,inv:false,invT:0,blinkT:0,gas:GAS_MAX,squashT:0,stretch:0,face:0,faceT:0,blastFlash:0,barrierT:0,slipT:0,mushT:0,shieldT:0,x2T:0,slowT:0,freeFartT:0};
let megaRingT=0;

// ============================================================
// AUDIO
// ============================================================
let AC=null,master=null,noiseBuf=null;
function initAudio(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=.32; master.connect(AC.destination);
    noiseBuf=AC.createBuffer(1,AC.sampleRate*0.3,AC.sampleRate); const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  }catch(e){AC=null;} }
  if(AC&&AC.state==='suspended')AC.resume();
  loadSamples();
}
function fart(cfg){
  if(!AC)return; const {freq=110,dur=.3,flutter=20,cutoff=1200,gain=.5,type='sawtooth'}=cfg;
  const t0=AC.currentTime;
  const osc=AC.createOscillator(); osc.type=type;
  osc.frequency.setValueAtTime(freq*1.35,t0); osc.frequency.exponentialRampToValueAtTime(Math.max(28,freq*.55),t0+dur);
  const lfo=AC.createOscillator(); lfo.type='square'; lfo.frequency.value=flutter;
  const lfoG=AC.createGain(); lfoG.gain.value=freq*.45; lfo.connect(lfoG); lfoG.connect(osc.frequency);
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=cutoff;
  const g=AC.createGain(); g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+.02); g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  const trem=AC.createOscillator(); trem.type='sawtooth'; trem.frequency.value=flutter*.9;
  const tremG=AC.createGain(); tremG.gain.value=gain*.45; trem.connect(tremG); tremG.connect(g.gain);
  osc.connect(lp); lp.connect(g); g.connect(master);
  osc.start(t0); lfo.start(t0); trem.start(t0); const e=t0+dur+.05; osc.stop(e); lfo.stop(e); trem.stop(e);
  if(cfg.wet) squelch(gain*.6);
}
function tone(cfg){ if(!AC)return; const {f0=300,f1=600,dur=.18,gain=.25,type='sine'}=cfg; const t0=AC.currentTime;
  const o=AC.createOscillator(); o.type=type; o.frequency.setValueAtTime(f0,t0); o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t0+dur);
  const g=AC.createGain(); g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+.015); g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+.05); }
function squelch(gain){ if(!AC||!noiseBuf)return; const t0=AC.currentTime; const src=AC.createBufferSource(); src.buffer=noiseBuf;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1600,t0); lp.frequency.exponentialRampToValueAtTime(300,t0+.25);
  const g=AC.createGain(); g.gain.setValueAtTime(gain||.3,t0); g.gain.exponentialRampToValueAtTime(.0001,t0+.28);
  src.connect(lp); lp.connect(g); g.connect(master); src.start(t0); src.stop(t0+.3); }
function airhorn(){ if(!AC)return; const t0=AC.currentTime; [380,560].forEach((f,i)=>{ const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
  const g=AC.createGain(); g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(.18,t0+.03); g.gain.setValueAtTime(.18,t0+.18); g.gain.exponentialRampToValueAtTime(.0001,t0+.28);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+.3); }); }
// ---- real fart samples (fall back to the synth if none load) ----
const SAMPLE_URLS=['assets/sounds/fart_01.wav','assets/sounds/fart_02.wav','assets/sounds/fart_03.wav','assets/sounds/fart_04.wav','assets/sounds/fart_05.wav','assets/sounds/fart_06.wav','assets/sounds/fart_07.wav','assets/sounds/fart_08.wav'];
let sampleBuffers=[], samplesTried=false;
function loadSamples(){ if(!AC||samplesTried)return; samplesTried=true;
  SAMPLE_URLS.forEach(url=>{ fetch(url).then(r=>r.ok?r.arrayBuffer():Promise.reject()).then(b=>AC.decodeAudioData(b)).then(buf=>sampleBuffers.push(buf)).catch(()=>{}); }); }
function playSample(rate,gain){ if(!AC||!sampleBuffers.length)return false; const buf=sampleBuffers[Math.floor(Math.random()*sampleBuffers.length)];
  const src=AC.createBufferSource(); src.buffer=buf; src.playbackRate.value=rate||1; const g=AC.createGain(); g.gain.value=gain||.7; src.connect(g); g.connect(master); src.start(); return true; }
const sfx={
  throw:()=>{ if(!playSample(R(.92,1.12),.6)) fart(T.sound.throw); },
  jump:()=>{ if(!playSample(R(1.35,1.65),.5)) fart(T.sound.jump); },
  blast:()=>{ if(!playSample(R(.72,.86),.85)){ fart(T.sound.blast); if(T.sound.airhorn) airhorn(); } },
  deflect:()=>tone({f0:320,f1:760,dur:.14,gain:.22}),
  stun:()=>tone({f0:520,f1:120,dur:.3,gain:.24,type:'triangle'}),
  hurt:()=>{ if(!playSample(R(.6,.72),.7)) fart({freq:270,dur:.5,flutter:22,cutoff:1300,gain:.4,type:T.sound.blast.type}); },
  over:()=>{ if(!playSample(.5,.85)) fart({freq:150,dur:.7,flutter:10,cutoff:900,gain:.5,type:T.sound.blast.type}); },
  pick:()=>tone({f0:400,f1:900,dur:.1,gain:.2,type:'square'})
};

// ============================================================
// INPUT
// ============================================================
const keys=new Set();
const ZONE_TOP=470;   // in Zones mode, touches below this drive movement
let controlStyle='buttons'; try{const c=localStorage.getItem('mm_ctrl'); if(c==='buttons'||c==='zones')controlStyle=c;}catch(e){}
function setControlStyle(s){ controlStyle=s; try{localStorage.setItem('mm_ctrl',s);}catch(e){} }
// Buttons mode: MOVE on the left thumb (◀▶), ACTIONS on the right thumb (JUMP + FART) — research-backed.
const BTN=[{id:'L',cx:54,cy:H-62,r:42,glyph:'◀'},{id:'R',cx:150,cy:H-62,r:42,glyph:'▶'},
  {id:'JUMP',cx:316,cy:H-62,r:42,glyph:'⤒'},{id:'FART',cx:426,cy:H-64,r:50,glyph:'💨'}];
const ZFART={cx:W/2,cy:H-62,r:54};   // Zones mode fart button (centre)
const pointers=new Map();            // pointerId -> {role, sx, sy, st}
function toCanvas(e){const r=canvas.getBoundingClientRect();return {x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};}
function btnAt(x,y){for(const b of BTN){const dx=x-b.cx,dy=y-b.cy;if(dx*dx+dy*dy<=(b.r+10)*(b.r+10))return b.id;}return null;}
function inZFart(x,y){const dx=x-ZFART.cx,dy=y-ZFART.cy;return dx*dx+dy*dy<=(ZFART.r+10)*(ZFART.r+10);}
function themeChips(){ const n=THEME_ORDER.length, w=104, h=46, gap=8, tot=n*w+(n-1)*gap, x0=(W-tot)/2, y=646;
  return THEME_ORDER.map((id,i)=>({id,x:x0+i*(w+gap),y,w,h})); }
function chipAt(x,y){ for(const c of themeChips()){ if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h) return c.id; } return null; }
function ctrlChips(){ const w=126,h=32,gap=12,y=584,tot=2*w+gap,x0=(W-tot)/2; return [{id:'buttons',label:'👆 Buttons',x:x0,y,w,h},{id:'zones',label:'🖐 Zones',x:x0+w+gap,y,w,h}]; }
function ctrlChipAt(x,y){ for(const c of ctrlChips()){ if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h)return c.id; } return null; }
const roles=()=>{ const a=[]; for(const r of pointers.values())a.push(r.role); return a; };

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault(); initAudio();
  const {x,y}=toCanvas(e);
  if(st===ST.LEVELDONE){ nextLevel(); return; }
  if(st!==ST.PLAY&&st!==ST.BOSS){ const cc=ctrlChipAt(x,y); if(cc){ setControlStyle(cc); sfx.pick(); return; } const cid=chipAt(x,y); if(cid){ setTheme(cid); sfx.pick(); return; } startGame(); return; }
  if(controlStyle==='buttons'){
    const id=btnAt(x,y); if(id){ pointers.set(e.pointerId,{role:id}); if(id==='JUMP')doJump(); else if(id==='FART')doBlast(); }
  } else {
    if(inZFart(x,y)){ pointers.set(e.pointerId,{role:'FART'}); doBlast(); }
    else if(y>ZONE_TOP){ pointers.set(e.pointerId,{role:x<W/2?'zoneL':'zoneR',sx:x,sy:y,st:e.timeStamp}); }
  }
},{passive:false});
canvas.addEventListener('pointermove',e=>{ const rec=pointers.get(e.pointerId); if(!rec)return;
  if(controlStyle==='buttons'&&(rec.role==='L'||rec.role==='R')){ const {x,y}=toCanvas(e); const id=btnAt(x,y); if(id==='L'||id==='R')rec.role=id; } },{passive:false});
function endP(e){ const rec=pointers.get(e.pointerId); if(rec){ if(rec.role==='zoneL'||rec.role==='zoneR'){ const {x,y}=toCanvas(e); const dt=e.timeStamp-rec.st, dist=Math.hypot(x-rec.sx,y-rec.sy); if(dt<250&&dist<28)doJump(); } pointers.delete(e.pointerId); } }
canvas.addEventListener('pointerup',endP); canvas.addEventListener('pointercancel',endP); canvas.addEventListener('pointerleave',endP);
window.addEventListener('keydown',e=>{ if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault(); initAudio();
  if(st===ST.LEVELDONE){ if(!e.repeat)nextLevel(); return; }
  if(st!==ST.PLAY&&st!==ST.BOSS){ if(!e.repeat){ if(e.key==='t'||e.key==='T'){ const i=THEME_ORDER.indexOf(themeId); setTheme(THEME_ORDER[(i+1)%THEME_ORDER.length]); sfx.pick(); } else if(e.key==='c'||e.key==='C'){ setControlStyle(controlStyle==='buttons'?'zones':'buttons'); sfx.pick(); } else startGame(); } return; }
  if(e.repeat)return; if(e.key===' '||e.key==='ArrowUp'||e.key==='w')doJump(); if(e.key==='f'||e.key==='ArrowDown'||e.key==='Shift')doBlast(); keys.add(e.key); });
window.addEventListener('keyup',e=>keys.delete(e.key));
const leftHeld=()=>{ if(keys.has('ArrowLeft')||keys.has('a'))return true; const r=roles(); return r.includes('L')||r.includes('zoneL'); };
const rightHeld=()=>{ if(keys.has('ArrowRight')||keys.has('d'))return true; const r=roles(); return r.includes('R')||r.includes('zoneR'); };

// ============================================================
// GAME FLOW / LOGIC  (unchanged across themes)
// ============================================================
function resetPlayer(inv){ P.x=W/2;P.y=PLAYER_GY;P.vy=0;P.onGround=true;P.inv=true;P.invT=inv||1.2;P.blinkT=0;P.gas=GAS_MAX;P.squashT=0;P.face=0;P.faceT=0;P.blastFlash=0;P.barrierT=0;P.slipT=0;P.mushT=0;P.shieldT=0;P.x2T=0;P.slowT=0;P.freeFartT=0; megaRingT=0; }
function clearField(){ bananas=[];particles=[];clouds=[];floaters=[];pops=[];peels=[];powerups=[];flashT=0;hitstop=0; }
function startGame(){ st=ST.PLAY; lives=LIVES_MAX; score=0; combo=0; comboBestRun=0; gameT=0; level=1; levelT=0; boss=null; tipT=3.6;
  clearField(); resetPlayer(1.2); monkeys=[]; setMonkeyCount(LEVELS[0].monkeys); }
function completeLevel(){ if(level>=10){ startBoss(); } else { st=ST.LEVELDONE; levelT=0; burstFx(P.x,P.y,14); sfx.stun(); } }
function nextLevel(){ level++; levelT=0; clearField(); resetPlayer(1.0); monkeys=[]; setMonkeyCount(LEVELS[level-1].monkeys); st=ST.PLAY; }
function startBoss(){ st=ST.BOSS; levelT=0; clearField(); resetPlayer(1.6); monkeys=[];
  boss={x:W/2,bx:W/2,by:98,hp:100,maxHp:100,atkT:1.4,chargeT:0,phase:1,lastPhase:1,bobT:0,swingT:0,hitFlash:0,vx:46,roarT:1.4,weakT:0,slamT:0,slamHit:0,deathT:0,minionsSpawned:false,wob:0,tell:null,angryT:0};
  addPop(W/2,168,'KING KONG-A-TOOT!','#ff5a5a'); doFlash('#ff5a5a',.4); addShake(14,.6); tone({f0:90,f1:50,dur:1.0,gain:.5,type:'sawtooth'}); }
function winGame(){ st=ST.WIN; sfx.pick(); for(let i=0;i<40;i++)particles.push({x:R(0,W),y:R(-40,H*.4),vx:R(-30,30),vy:R(60,180),kind:'star',life:R(1.5,3),maxLife:3,size:R(6,13)}); const fs=Math.floor(score); if(fs>best){best=fs;try{localStorage.setItem('fartback_best',String(best));}catch(e){}} }
function pickKind(){ if(level<5)return 'reg'; const r=Math.random(); if(level>=7&&r<.16)return 'boom'; return r<.70?'reg':'gun'; }
function setMonkeyCount(n){ while(monkeys.length<n){ const nx=R(60,W-60), ny=R(94,110), kind=pickKind();
    monkeys.push({x:nx,y:ny,bx:nx,by:ny,kind,swingT:Math.random()*6.28,swayX:R(7,13),vx:(Math.random()<.5?-1:1)*R(30,68),retargetT:R(1.4,3.4),bobT:Math.random()*6.28,throwT:kind==='boom'?R(1.6,2.6):R(.7,1.8),angryT:0,charge:0,stun:0,wob:0,gust:0}); }

}
function drawHeart(x,y,s){ ctx.fillStyle='#ff4d6d'; ctx.beginPath(); ctx.moveTo(x,y+s*.4); ctx.bezierCurveTo(x-s,y-s*.6,x-s*1.1,y+s*.3,x,y+s); ctx.bezierCurveTo(x+s*1.1,y+s*.3,x+s,y-s*.6,x,y+s*.4); ctx.fill(); }
function drawBtn(cx,cy,r,glyph,gs,pressed,ready,accentFill){ const sc=pressed?.9:1;

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

// ============================================================
// SCREENS
// ============================================================
function burstShape(cx,cy,r){ ctx.beginPath(); const n=11; for(let i=0;i<n*2;i++){const a=i*Math.PI/n;const rr2=i%2?r*.55:r;ctx.lineTo(cx+Math.cos(a)*rr2,cy+Math.sin(a)*rr2);} ctx.closePath(); }
function tape(cx,cy,deg){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(deg*Math.PI/180); ctx.fillStyle='rgba(240,214,96,.55)'; ctx.fillRect(-17,-7,34,14); ctx.strokeStyle='rgba(180,150,40,.5)'; ctx.lineWidth=1; ctx.strokeRect(-17,-7,34,14); ctx.restore(); }

// Per-theme screen frame — each world gets bespoke menu chrome.
function panel(x,y,w,h){
  if(T.stickers){                    // LOUD — comic panel
    ctx.fillStyle=T.panel; rr(x,y,w,h,16); ctx.fill();
    ctx.lineWidth=6; ctx.strokeStyle='#000'; ctx.lineJoin='round'; rr(x,y,w,h,16); ctx.stroke();
    ctx.lineWidth=2.5; ctx.strokeStyle=T.accent; rr(x+6,y+6,w-12,h-12,11); ctx.stroke();
    [[x+10,y+8,'#ff3d7f'],[x+w-10,y+8,'#17d1e8']].forEach(([bx,by,col],i)=>{
      ctx.fillStyle='#000'; burstShape(bx,by,26); ctx.fill();
      ctx.fillStyle=col; burstShape(bx,by,22); ctx.fill();
      ctx.fillStyle='#000'; ctx.font='900 9px "Arial Black",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.save(); ctx.translate(bx,by); ctx.rotate((i?12:-12)*Math.PI/180); ctx.fillText(i?'POW!':'PBBT!',0,0); ctx.restore(); });
  } else if(T.wobble){               // DOODLE — hand-drawn sketch box
    ctx.fillStyle=T.panel; rr(x,y,w,h,14); ctx.fill();
    ctx.strokeStyle=T.border; ctx.lineWidth=2.5; rr(x,y,w,h,14); ctx.stroke();
    ctx.strokeStyle=T.outline; ctx.lineWidth=1.4; rr(x+3,y+2.5,w-6,h-5,12); ctx.stroke();
    tape(x+22,y,-13); tape(x+w-22,y,13);
  } else if(T.grain){                // INKWELL — old-timey title card
    ctx.fillStyle=T.panel; rr(x,y,w,h,10); ctx.fill();
    ctx.save(); rr(x,y,w,h,10); ctx.clip();
    const g=ctx.createRadialGradient(x+w/2,y+72,8,x+w/2,y+72,w*.75); g.addColorStop(0,'rgba(215,165,44,.2)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h); ctx.restore();
    ctx.strokeStyle=T.border; ctx.lineWidth=3; rr(x+5,y+5,w-10,h-10,7); ctx.stroke();
    ctx.lineWidth=1; rr(x+10,y+10,w-20,h-20,5); ctx.stroke();
    ctx.fillStyle=T.border; [[x+10,y+10],[x+w-10,y+10],[x+10,y+h-10],[x+w-10,y+h-10]].forEach(([dx,dy])=>{ctx.save();ctx.translate(dx,dy);ctx.rotate(.785);ctx.fillRect(-3.5,-3.5,7,7);ctx.restore();});
  } else {                           // PLASTICINE — clay slab
    ctx.save(); ctx.shadowColor='rgba(50,34,18,.55)'; ctx.shadowBlur=20; ctx.shadowOffsetY=9; ctx.fillStyle=T.panel; rr(x,y,w,h,22); ctx.fill(); ctx.restore();
    ctx.fillStyle='rgba(255,255,255,.4)'; rr(x+12,y+9,w-24,9,5); ctx.fill();
    ctx.lineWidth=4; ctx.strokeStyle=T.border; rr(x,y,w,h,22); ctx.stroke();
  }
}

// Themed title lettering.
function drawTitle(text,x,y,size,color){
  color=color||T.accent; ctx.font=T.titleFont(size); ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  if(T.stickers){ ctx.lineJoin='round'; ctx.lineWidth=size*.15; ctx.strokeStyle='#000'; ctx.strokeText(text,x,y); ctx.fillStyle=color; ctx.fillText(text,x,y); }
  else if(T.grain){ ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillText(text,x+2,y+2); ctx.fillStyle=color; ctx.fillText(text,x,y); }
  else if(T.wobble){ ctx.fillStyle=color; ctx.fillText(text,x,y); const w=ctx.measureText(text).width;
    ctx.strokeStyle=T.border; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.beginPath();
    for(let i=0;i<=w;i+=6){ const px=x-w/2+i; ctx.lineTo(px,y+7+Math.sin(i*.4)*1.6); } ctx.stroke(); }
  else { ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillText(text,x,y-1.5); ctx.fillStyle=color; ctx.fillText(text,x,y); }
}

function drawBoss(){ const x=boss.bx,y=boss.by; const col=boss.hitFlash>0?'#ffffff':T.monkeyBody;
  const roar=boss.roarT>0, weak=boss.weakT>0, dying=boss.deathT>0;
  const sc=roar?1.16:1, yOff=boss.slamHit>0?18*(boss.slamHit/.28):0;
  if(weak){ ctx.save(); ctx.globalAlpha=.32+.3*Math.abs(Math.sin(boss.wob)); ctx.fillStyle=T.fart; ctx.beginPath(); ctx.arc(x,y,74,0,6.28); ctx.fill(); ctx.restore(); }
  ctx.save(); ctx.translate(x,y+yOff); if(dying)ctx.rotate(boss.wob*.5); ctx.scale(sc,sc); ctx.translate(-x,-y);
  if(!dying){ ctx.strokeStyle=col; ctx.lineWidth=13; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x-48,BRANCH_Y+2); ctx.lineTo(x-26,y-28); ctx.moveTo(x+48,BRANCH_Y+2); ctx.lineTo(x+26,y-28); ctx.stroke(); }

  drawEyes(x-12,y-22,x+12,y-22, weak||dying);
  ctx.strokeStyle=T.outlineW>0?T.outline:'#3a2a18'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-20,y-32); ctx.lineTo(x-6,y-27); ctx.moveTo(x+20,y-32); ctx.lineTo(x+6,y-27); ctx.stroke();
  if(roar||weak){ ctx.fillStyle='#3a0f12'; ctx.beginPath(); ctx.ellipse(x,y-5,15,13,0,0,6.28); ctx.fill(); ctx.fillStyle='#ff6b9a'; ctx.beginPath(); ctx.ellipse(x,y,8,6,0,0,6.28); ctx.fill(); }
  ell(x-22,y+42,20,17,col); ell(x+22,y+42,20,17,col);
  ctx.strokeStyle=themeId==='ink'?'#4a4038':(T.outlineW>0?T.outline:'rgba(70,45,22,.55)'); ctx.lineWidth=Math.max(3,T.outlineW); ctx.beginPath(); ctx.moveTo(x,y+26); ctx.lineTo(x,y+58); ctx.stroke();
  const cw=54,cx=x-cw/2,cy=y-58; ctx.fillStyle='#ffd700'; ctx.strokeStyle='#b8860b'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy+18); ctx.lineTo(cx,cy+2); ctx.lineTo(cx+cw*.25,cy+12); ctx.lineTo(cx+cw*.5,cy-6); ctx.lineTo(cx+cw*.75,cy+12); ctx.lineTo(cx+cw,cy+2); ctx.lineTo(cx+cw,cy+18); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(boss.chargeT>0&&!weak){ ctx.globalAlpha=.65; ctx.fillStyle=T.fart; for(let k=0;k<6;k++){ctx.beginPath();ctx.arc(x+Math.sin(k*1.5)*18,y+62+k*5,15-k*1.6,0,6.28);ctx.fill();} ctx.globalAlpha=1; ctx.fillStyle='#ff5a5a'; ctx.font=T.hudFont(22); ctx.fillText('!!',x,y-78); }
  if(boss.slamT>0){ ctx.fillStyle='#ff5a5a'; ctx.font=T.hudFont(20); ctx.fillText('▼ SLAM ▼',x,y-78); }
  if(roar){ ctx.fillStyle='#ff5a5a'; ctx.font=T.titleFont(22); ctx.fillText('ROAAR!',x,y-84); }
  if(weak){ ctx.fillStyle=T.accent; ctx.font=T.hudFont(11); for(let k=0;k<3;k++){const a=boss.wob+k*2.1;ctx.fillText('✦',x+Math.cos(a)*42,y-42+Math.sin(a)*10);} ctx.font=T.hudFont(13); ctx.fillText('HIT THE WEAK POINT!',x,y-84); } }

// ============================================================
// MAIN
// ============================================================
function draw(){
  ctx.clearRect(0,0,W,H);
  if(st===ST.START){drawStart();return;}
  if(st===ST.OVER){drawOver();return;}
  if(st===ST.WIN){drawWin();return;}
  ctx.save(); if(shakeT>0)ctx.translate(R(-1,1)*shakeMag*shakeT,R(-1,1)*shakeMag*shakeT);
  drawBg(); for(const c of clouds)drawCloud(c); for(const m of monkeys)drawMonkey(m); if(st===ST.BOSS&&boss)drawBoss(); for(const p of peels)drawPeel(p); for(const pu of powerups)drawPowerup(pu); for(const b of bananas)drawBanana(b); drawPlayer(); drawParticles(); drawFloaters(); drawPops(); drawOverlay();
  ctx.restore();
  if(P.slowT>0){ ctx.globalAlpha=.1; ctx.fillStyle=PU_COLORS.plug; ctx.fillRect(0,0,W,CTRL_TOP); ctx.globalAlpha=1; }
  drawHUD(); drawEffectPips(); drawControls();
  if(st===ST.LEVELDONE)drawLevelDone();
  if(flashT>0){ ctx.globalAlpha=Math.min(.28,flashT); ctx.fillStyle=flashCol; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
}
function loop(ts){ const dt=Math.min((ts-lastTs)/1000,.05); lastTs=ts; if(hitstop>0){hitstop-=dt;}else{update(dt);} draw(); requestAnimationFrame(loop); }
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
