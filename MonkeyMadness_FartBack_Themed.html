<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#0a0910;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;

<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
// Fill the device instead of letterboxing it. The canvas takes the screen's own aspect
// ratio (clamped), so a tall phone gets more sky rather than black bands top and bottom.
// Everything is anchored to the top (branch) or the bottom (ground/controls), so the
// extra height becomes dodge room — and since the monkeys' throws are timed to a flight
// duration rather than a speed, a taller field doesn't change the difficulty.
const W=480;
// The viewport can still read 0 at parse time (hidden tab, iframe not yet laid out),
// which would lock in the wrong H for the whole session — so fall back to `screen`,
// which is layout-independent. On a phone that's the device ratio; on a desktop it's
// landscape and clamps to the classic 480x760.
const VW=document.documentElement.clientWidth||window.innerWidth||0;
const VH=document.documentElement.clientHeight||window.innerHeight||0;
const AR=(VW>0&&VH>0)?VH/VW:((screen.width>0&&screen.height>0)?screen.height/screen.width:760/480);
const H=Math.round(Math.min(1100,Math.max(760,W*AR)));
canvas.width=W; canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=W*s+'px';canvas.style.height=H*s+'px';}
resize(); window.addEventListener('resize',resize);

// ---------- layout ----------
const CTRL_TOP=H-120, GROUND_Y=CTRL_TOP-42, PLAYER_GY=GROUND_Y-26;   // lives come from the difficulty
const BRANCH_Y=42;
const SY=Math.round(H/2-380);   // menu screens were laid out against H=760; re-centre them
const GRAV=1500, JUMP=-660, PSPEED=305;
const GAS_MAX=100, BLAST_COST=34, GAS_RECHARGE=30;
const BARRIER_T=0.5, SLIP_T=1.2, PEEL_LIFE=5, PEEL_R=20;
const PU_SHIELD=6, PU_X2=8, PU_SLOW=4, PU_DROP_LIFE=7, PU_FREE=4.5, PU_MAGNET=7;
// The rise is DERIVED from the field height so the cloud always takes ~FCLOUD_T seconds
// to reach the branch, whatever the screen shape — slow enough that a monkey can swing
// clear, unlike the auto-aimed throw. (Hard-coding it means it can't reach a tall field.)
const AMMO_MAX=6, AMMO_START=3, FCLOUD_LIFE=2.6, FCLOUD_DRAG=10, GBAN_LIFE=6;
// Sniper Chimp: laser tracks you for (AIM_T - LOCK_T), then LOCKS and turns red — that
// window plus the shot's travel is your cue to step off the line.
const AIM_T=1.15, LOCK_T=.4, SNIPE_SPD=640;
const FCLOUD_T=1.5, FCLOUD_RISE=-((PLAYER_GY-110-60)/FCLOUD_T);
const PU_COLORS={mask:'#25d4e8',gold:'#ffe234',plug:'#b06bff',beano:'#93e552',bean:'#ffab2e',mega:'#ff4db8',magnet:'#ff5b4a'};
const R=(a,b)=>a+Math.random()*(b-a);

// ============================================================
// THEMES  — art direction is data + a few style flags.
// Add a new world by adding an entry here; nothing else changes.
// ============================================================
const THEMES={
  loud:{
    name:'LOUD!', icon:'💥',
    bg:'halftone', bgBase:'#2a1857', bgDot:'#ff3d7f', bgDotSize:16,
    para:{kind:'rings', cols:['#3a2270','#472a86']},
    ground:'#17d1e8', groundEdge:'#0fb0c6',
    outline:'#000000', outlineW:5,
    monkeyBody:'#8a4bd6', monkeyFace:'#ffe022', ear:'#7a3ec6',
    playerBody:'#17d1e8', playerSkin:'#ffb0c7',
    banana:'#ffe022', bananaTip:'#e0b800',
    fart:'#7CFF5A', fartRing:'#c8ffb0',
    eye:'dot',
    text:'#ffffff', accent:'#ffe022', panel:'rgba(43,24,87,.92)', border:'#ff3d7f',
    titleFont:(s)=>`900 italic ${s}px "Arial Black",Impact,sans-serif`,
    hudFont:(s)=>`900 ${s}px "Arial Black",Impact,sans-serif`,
    stickers:true,
    sound:{throw:{freq:150,dur:.2,flutter:24,cutoff:1500,gain:.32,type:'sawtooth'},
           jump:{freq:250,dur:.14,flutter:30,cutoff:1900,gain:.28,type:'square'},
           blast:{freq:90,dur:.4,flutter:16,cutoff:1300,gain:.5,type:'sawtooth'}, airhorn:true}
  },
  doodle:{
    name:'Doodle', icon:'🖍️',
    bg:'paper', bgBase:'#fbf7ea', rule:'#cfe0ef', margin:'#e8907f',
    para:{kind:'clouds', cols:['#e4eef8','#f1f6fb']},
    ground:'#8fca6a', groundEdge:'#5a9a3a',
    outline:'#5a3a17', outlineW:3,
    monkeyBody:'#a06a34', monkeyFace:'#d0a468', ear:'#8a5a2b',
    playerBody:'#e24b3a', playerSkin:'#f4c9a0',
    banana:'#f4c020', bananaTip:'#b98a00',
    fart:'#8fca6a', fartRing:'#c3e6a6',
    eye:'googly',
    text:'#3a2a17', accent:'#e24b3a', panel:'rgba(251,247,234,.95)', border:'#3f6fd1',
    titleFont:(s)=>`700 ${s}px "Comic Sans MS","Chalkboard SE","Bradley Hand",cursive`,
    hudFont:(s)=>`700 ${s}px "Comic Sans MS","Chalkboard SE",cursive`,
    wobble:true,
    sound:{throw:{freq:300,dur:.17,flutter:34,cutoff:2200,gain:.24,type:'square'},
           jump:{freq:430,dur:.12,flutter:36,cutoff:2600,gain:.22,type:'square'},
           blast:{freq:210,dur:.3,flutter:26,cutoff:1800,gain:.34,type:'square'}}
  },
  ink:{
    name:'Inkwell', icon:'🎩',
    bg:'inkpaper', bgBase:'#efe4c6',
    para:{kind:'hills', cols:['#d9cba8','#e5d9ba']},
    ground:'#181410', groundEdge:'#2a2016',
    outline:'#181410', outlineW:3,
    monkeyBody:'#181410', monkeyFace:'#efe4c6', ear:'#181410',
    playerBody:'#181410', playerSkin:'#efe4c6',
    banana:'#d7a52c', bananaTip:'#8a6410',
    fart:'#fffef0', fartRing:'#ffffff',
    eye:'pie',
    text:'#efe4c6', accent:'#d7a52c', panel:'rgba(24,20,16,.92)', border:'#d7a52c',
    titleFont:(s)=>`800 italic ${s}px Georgia,"Times New Roman",serif`,
    hudFont:(s)=>`700 ${s}px Georgia,serif`,
    grain:true, vignette:true, smokeRings:true,
    sound:{throw:{freq:110,dur:.26,flutter:14,cutoff:820,gain:.34,type:'sawtooth'},
           jump:{freq:170,dur:.16,flutter:16,cutoff:1000,gain:.28,type:'triangle'},
           blast:{freq:68,dur:.5,flutter:11,cutoff:700,gain:.5,type:'sawtooth'}}
  },
  clay:{
    name:'Plasticine', icon:'🟤',
    bg:'clay', bgTop:'#f0e4cf', bgBot:'#c9b088',
    para:{kind:'hills', cols:['#cdb994','#dccdb0']},
    ground:'#b98f5f', groundEdge:'#9a7145',
    outline:'#5a3e22', outlineW:0,
    monkeyBody:'#8a6038', monkeyFace:'#b98a5b', ear:'#7a5330',
    playerBody:'#3fa39a', playerSkin:'#e6b487',
    banana:'#f0c53d', bananaTip:'#c99a1e',
    fart:'#bfe6a0', fartRing:'#d8f0c4',
    eye:'clay',
    text:'#4a3320', accent:'#2c7d75', panel:'rgba(238,226,204,.96)', border:'#c99a1e',
    titleFont:(s)=>`800 ${s}px "SF Pro Rounded","Arial Rounded MT Bold","Trebuchet MS",sans-serif`,
    hudFont:(s)=>`700 ${s}px "Trebuchet MS",sans-serif`,
    clayShadow:true, highlight:true,
    sound:{throw:{freq:130,dur:.2,flutter:18,cutoff:900,gain:.3,type:'sawtooth',wet:true},
           jump:{freq:200,dur:.13,flutter:20,cutoff:1100,gain:.26,type:'sawtooth',wet:true},
           blast:{freq:80,dur:.4,flutter:13,cutoff:800,gain:.46,type:'sawtooth',wet:true}}
  }
};
const THEME_ORDER=['loud','doodle','ink','clay'];
let themeId='loud';
try{ const s=localStorage.getItem('mm_theme'); if(s&&THEMES[s]) themeId=s; }catch(e){}
let T=THEMES[themeId];

// cached background patterns (rebuilt on theme change)
let patHalftone=null, patGrain=null;
function buildPatterns(){
  patHalftone=null; patGrain=null;
  if(T.bg==='halftone'){
    const c=document.createElement('canvas'); c.width=c.height=T.bgDotSize;
    const g=c.getContext('2d'); g.fillStyle=T.bgDot; g.beginPath();
    g.arc(T.bgDotSize/2,T.bgDotSize/2,T.bgDotSize*0.22,0,6.28); g.fill();
    patHalftone=ctx.createPattern(c,'repeat');
  }
  if(T.grain){
    const c=document.createElement('canvas'); c.width=c.height=72;
    const g=c.getContext('2d'), id=g.createImageData(72,72);
    for(let i=0;i<id.data.length;i+=4){const v=Math.random()*255;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=18;}
    g.putImageData(id,0,0); patGrain=ctx.createPattern(c,'repeat');
  }
}
function setTheme(id){ themeId=id; T=THEMES[id]; try{localStorage.setItem('mm_theme',id);}catch(e){} buildPatterns(); }
buildPatterns();
// The splash paints all four worlds side by side, so it needs every theme's pattern at
// once. Build them up-front — rebuilding 4x per frame would churn canvases every tick.
const splashPats={};
(function(){ const save=themeId;
  for(const id of THEME_ORDER){ themeId=id; T=THEMES[id]; buildPatterns(); splashPats[id]={halftone:patHalftone,grain:patGrain}; }
  themeId=save; T=THEMES[save]; buildPatterns(); })();
// Run `fn` with a different theme active, then put everything back.
function withTheme(id,fn){ const sT=themeId,sH=patHalftone,sG=patGrain;
  themeId=id; T=THEMES[id]; patHalftone=splashPats[id].halftone; patGrain=splashPats[id].grain;
  try{ fn(); } finally { themeId=sT; T=THEMES[sT]; patHalftone=sH; patGrain=sG; } }

// ============================================================
// STATE
// ============================================================
const ST={START:0,PLAY:1,LEVELDONE:2,BOSS:3,WIN:4,OVER:5,PAUSE:6,SPLASH:7,SHOP:8};
let pauseFrom=ST.PLAY;   // so RESUME returns you to PLAY or BOSS, whichever you paused from
let splashT=0; const SPLASH_LEN=3.4;   // auto-advances; tap skips
const LEVELS=[{secs:9,monkeys:1},{secs:10,monkeys:1},{secs:11,monkeys:1},{secs:12,monkeys:2},{secs:12,monkeys:2},{secs:13,monkeys:2},{secs:13,monkeys:3},{secs:14,monkeys:3},{secs:15,monkeys:3},{secs:16,monkeys:4}];
let st=ST.SPLASH, lives, score, best=0, combo, comboBestRun, gameT, tipT, lastTs=0, level=1, levelT=0, boss=null;

// ---------- save data ----------
const SAVE={ best:'fartback_best', coins:'mm_coins', life:'mm_lifetime', owned:'mm_owned',
             hat:'mm_hat', skin:'mm_skin', diff:'mm_diff', daily:'mm_daily' };
function load(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k,String(v)); }catch(e){} }
function loadInt(k,d){ const n=parseInt(load(k,''),10); return Number.isFinite(n)?n:d; }
best=loadInt(SAVE.best,0);
let coins=loadInt(SAVE.coins,0);          // spendable
let lifetime=loadInt(SAVE.life,0);        // never spent — drives rank
let runCoins=0;                           // earned this run, for the game-over tally

// ---------- difficulty ----------
// Easy isn't just more lives: the whole barrage relaxes. Mateo is 6.
const DIFFS={
  easy:  {label:'😌 Easy',   lives:6, ivMul:1.34, flightAdd:.15, aimMul:1.45, blackMul:.45, coinMul:1},
  normal:{label:'🔥 Normal', lives:4, ivMul:1,    flightAdd:0,   aimMul:1,    blackMul:1,   coinMul:1.35},
};
let diffId=(load(SAVE.diff,'normal')in DIFFS)?load(SAVE.diff,'normal'):'normal';
let D=DIFFS[diffId];
function setDiff(id){ if(!DIFFS[id])return; diffId=id; D=DIFFS[id]; save(SAVE.diff,id); }

let monkeys=[],bananas=[],particles=[],clouds=[],floaters=[],peels=[],pops=[],powerups=[],fartClouds=[],groundBananas=[],coinsOnGround=[],stars=[];
let shakeT=0,shakeMag=0,flashT=0,flashCol='#fff',hitstop=0;
const P={x:W/2,y:PLAYER_GY,vy:0,onGround:true,inv:false,invT:0,blinkT:0,gas:GAS_MAX,squashT:0,stretch:0,face:0,faceT:0,blastFlash:0,barrierT:0,slipT:0,mushT:0,shieldT:0,x2T:0,slowT:0,freeFartT:0,bananas:AMMO_START,throwT:0,magnetT:0};
let megaRingT=0;

// ============================================================
// AUDIO
// ============================================================
let AC=null,master=null,noiseBuf=null;
function initAudio(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=.32; master.connect(AC.destination);
    noiseBuf=AC.createBuffer(1,AC.sampleRate*0.3,AC.sampleRate); const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  }catch(e){AC=null;} }
  if(AC&&AC.state==='suspended')AC.resume();
  loadSamples();
}
function fart(cfg){
  if(!AC)return; const {freq=110,dur=.3,flutter=20,cutoff=1200,gain=.5,type='sawtooth'}=cfg;
  const t0=AC.currentTime;
  const osc=AC.createOscillator(); osc.type=type;
  osc.frequency.setValueAtTime(freq*1.35,t0); osc.frequency.exponentialRampToValueAtTime(Math.max(28,freq*.55),t0+dur);
  const lfo=AC.createOscillator(); lfo.type='square'; lfo.frequency.value=flutter;
  const lfoG=AC.createGain(); lfoG.gain.value=freq*.45; lfo.connect(lfoG); lfoG.connect(osc.frequency);
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=cutoff;
  const g=AC.createGain(); g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+.02); g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  const trem=AC.createOscillator(); trem.type='sawtooth'; trem.frequency.value=flutter*.9;
  const tremG=AC.createGain(); tremG.gain.value=gain*.45; trem.connect(tremG); tremG.connect(g.gain);
  osc.connect(lp); lp.connect(g); g.connect(master);
  osc.start(t0); lfo.start(t0); trem.start(t0); const e=t0+dur+.05; osc.stop(e); lfo.stop(e); trem.stop(e);
  if(cfg.wet) squelch(gain*.6);
}
function tone(cfg){ if(!AC)return; const {f0=300,f1=600,dur=.18,gain=.25,type='sine'}=cfg; const t0=AC.currentTime;
  const o=AC.createOscillator(); o.type=type; o.frequency.setValueAtTime(f0,t0); o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t0+dur);
  const g=AC.createGain(); g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+.015); g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+.05); }
function squelch(gain){ if(!AC||!noiseBuf)return; const t0=AC.currentTime; const src=AC.createBufferSource(); src.buffer=noiseBuf;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1600,t0); lp.frequency.exponentialRampToValueAtTime(300,t0+.25);
  const g=AC.createGain(); g.gain.setValueAtTime(gain||.3,t0); g.gain.exponentialRampToValueAtTime(.0001,t0+.28);
  src.connect(lp); lp.connect(g); g.connect(master); src.start(t0); src.stop(t0+.3); }
function airhorn(){ if(!AC)return; const t0=AC.currentTime; [380,560].forEach((f,i)=>{ const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
  const g=AC.createGain(); g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(.18,t0+.03); g.gain.setValueAtTime(.18,t0+.18); g.gain.exponentialRampToValueAtTime(.0001,t0+.28);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+.3); }); }
// ---- real fart samples (fall back to the synth if none load) ----
const SAMPLE_URLS=['assets/sounds/fart_01.wav','assets/sounds/fart_02.wav','assets/sounds/fart_03.wav','assets/sounds/fart_04.wav','assets/sounds/fart_05.wav','assets/sounds/fart_06.wav','assets/sounds/fart_07.wav','assets/sounds/fart_08.wav'];
let sampleBuffers=[], samplesTried=false;
function loadSamples(){ if(!AC||samplesTried)return; samplesTried=true;
  SAMPLE_URLS.forEach(url=>{ fetch(url).then(r=>r.ok?r.arrayBuffer():Promise.reject()).then(b=>AC.decodeAudioData(b)).then(buf=>sampleBuffers.push(buf)).catch(()=>{}); }); }
function playSample(rate,gain){ if(!AC||!sampleBuffers.length)return false; const buf=sampleBuffers[Math.floor(Math.random()*sampleBuffers.length)];
  const src=AC.createBufferSource(); src.buffer=buf; src.playbackRate.value=rate||1; const g=AC.createGain(); g.gain.value=gain||.7; src.connect(g); g.connect(master); src.start(); return true; }
const sfx={
  throw:()=>{ if(!playSample(R(.92,1.12),.6)) fart(T.sound.throw); },
  jump:()=>{ if(!playSample(R(1.35,1.65),.5)) fart(T.sound.jump); },
  blast:()=>{ if(!playSample(R(.72,.86),.85)){ fart(T.sound.blast); if(T.sound.airhorn) airhorn(); } },
  deflect:()=>tone({f0:320,f1:760,dur:.14,gain:.22}),
  stun:()=>tone({f0:520,f1:120,dur:.3,gain:.24,type:'triangle'}),
  hurt:()=>{ if(!playSample(R(.6,.72),.7)) fart({freq:270,dur:.5,flutter:22,cutoff:1300,gain:.4,type:T.sound.blast.type}); },
  over:()=>{ if(!playSample(.5,.85)) fart({freq:150,dur:.7,flutter:10,cutoff:900,gain:.5,type:T.sound.blast.type}); },
  pick:()=>tone({f0:400,f1:900,dur:.1,gain:.2,type:'square'})
};

// ============================================================
// INPUT
// ============================================================
const keys=new Set();
const ZONE_TOP=CTRL_TOP-170;   // in Zones mode, touches below this drive movement
let controlStyle='buttons'; try{const c=localStorage.getItem('mm_ctrl'); if(c==='buttons'||c==='zones')controlStyle=c;}catch(e){}
function setControlStyle(s){ controlStyle=s; try{localStorage.setItem('mm_ctrl',s);}catch(e){} }
// Buttons mode: MOVE on the left thumb (◀▶), ACTIONS on the right thumb (JUMP · THROW · FART) — research-backed.
const BTN=[{id:'L',cx:46,cy:H-62,r:40,glyph:'◀'},{id:'R',cx:132,cy:H-62,r:40,glyph:'▶'},
  {id:'JUMP',cx:232,cy:H-62,r:38,glyph:'⤒'},{id:'THROW',cx:330,cy:H-62,r:40,glyph:'🍌'},
  {id:'FART',cx:428,cy:H-64,r:44,glyph:'💨'}];
const ZFART={cx:W/2+64,cy:H-62,r:50},ZTHROW={cx:W/2-64,cy:H-62,r:46};  // Zones mode action buttons
const PAUSE_BTN={cx:26,cy:24,r:16};   // top-left, away from both thumbs
function pauseChoices(){ const w=232,h=56,x0=W/2-w/2,y=H/2-4;
  return [{id:'resume',label:'▶  RESUME',x:x0,y,w,h},{id:'menu',label:'🏠  MAIN MENU',x:x0,y:y+70,w,h}]; }
function pauseChoiceAt(x,y){ for(const c of pauseChoices()){ if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h)return c.id; } return null; }
function pauseGame(){ if(st!==ST.PLAY&&st!==ST.BOSS)return; pauseFrom=st; st=ST.PAUSE; pointers.clear(); keys.clear(); sfx.pick(); }
function toMenu(){ st=ST.START; clearField(); monkeys=[]; boss=null; sfx.pick(); }
const pointers=new Map();            // pointerId -> {role, seq, sx, sy, st}
let pressSeq=0;                      // press order, so the NEWEST direction wins
// The drawn ◀▶ circles are the affordance, not the target: everything in the control
// strip left of JUMP steers. A thumb landing low or between the buttons used to hit
// nothing at all — the strip is 120 tall but the circles only accepted the middle 100.
const MOVE_ZONE_R=190, MOVE_SPLIT=89;
// Written as positive tests so NaN falls out as null. `y<CTRL_TOP||x>=MOVE_ZONE_R` is
// false for NaN, which let a garbage coord through and returned a phantom 'R'.
function moveZoneAt(x,y){ if(!(y>=CTRL_TOP)||!(x<MOVE_ZONE_R))return null; return x<MOVE_SPLIT?'L':'R'; }
function toCanvas(e){const r=canvas.getBoundingClientRect();return {x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};}
// nearest-wins, so the tighter 5-button spacing can't hand a tap to the wrong neighbour
function btnAt(x,y){let best=null,bd=1e9;for(const b of BTN){const dx=x-b.cx,dy=y-b.cy,d=dx*dx+dy*dy;if(d<=(b.r+10)*(b.r+10)&&d<bd){bd=d;best=b.id;}}return best;}
function inRound(z,x,y){const dx=x-z.cx,dy=y-z.cy;return dx*dx+dy*dy<=(z.r+10)*(z.r+10);}
function ctrlChips(){ const w=126,h=32,gap=12,y=H-186,tot=2*w+gap,x0=(W-tot)/2; return [{id:'buttons',label:'👆 Buttons',x:x0,y,w,h},{id:'zones',label:'🖐 Zones',x:x0+w+gap,y,w,h}]; }
function ctrlChipAt(x,y){ for(const c of ctrlChips()){ if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h)return c.id; } return null; }
const roles=()=>{ const a=[]; for(const r of pointers.values())a.push(r.role); return a; };

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault(); initAudio();
  const {x,y}=toCanvas(e);
  if(st===ST.SPLASH){ st=ST.START; return; }   // skip — NOT straight into a game
  if(st===ST.PAUSE){ const pc=pauseChoiceAt(x,y); if(pc==='resume'){ st=pauseFrom; sfx.pick(); } else if(pc==='menu'){ toMenu(); } return; }
  if(st===ST.LEVELDONE){ nextLevel(); return; }

// Which way you actually go. The NEWEST press wins: holding ◀ and then resting a second
// thumb on ▶ used to cancel to a dead stop, which read as "the sprite just won't move".
function moveDir(){
  let dir=0, bestSeq=-1;
  for(const r of pointers.values()){
    const d=(r.role==='L'||r.role==='zoneL')?-1:((r.role==='R'||r.role==='zoneR')?1:0);
    if(d&&(r.seq??0)>bestSeq){ bestSeq=r.seq??0; dir=d; }
  }
  if(dir)return dir;
  const kl=keys.has('ArrowLeft')||keys.has('a'), kr=keys.has('ArrowRight')||keys.has('d');
  return (kl&&!kr)?-1:((kr&&!kl)?1:0);
}

// Weighted pool rather than chained thresholds — with chained ifs the newest kind

  if(level>=6)pool.push(['sniper',16]);

function update(dt){

  clouds=clouds.filter(c=>{c.r+=dt*26;c.life-=dt;c.x+=Math.sin(c.life*6)*8*dt;return c.life>0;});
  floaters=floaters.filter(f=>{f.y+=f.vy*dt;f.vy+=60*dt;f.life-=dt;return f.life>0;});
  pops=pops.filter(p=>{p.life-=dt;p.y-=12*dt;return p.life>0;});
  if(flashT>0)flashT-=dt*2.6;
  if(st===ST.WIN&&Math.random()<.5)particles.push({x:R(0,W),y:-20,vx:R(-30,30),vy:R(80,160),kind:'star',life:R(2,3.4),maxLife:3.4,size:R(6,13)});
  if(st!==ST.PLAY&&st!==ST.BOSS)return;

// ---------- background ----------
// Depth layers that slide against the player. Deliberately low-contrast — this is the
// FAR distance, and it must never compete with a banana you have to see and dodge.
// The camera never moves here — only the player does, across a fixed screen — so depth
// has to come from how much each layer slides against YOU. Too shallow and it's invisible.
const PARA_FAR=0.10, PARA_NEAR=0.24;
function drawParallax(){
  const p=T.para; if(!p)return;
  const ox=P.x-W/2, gy=GROUND_Y;
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,gy); ctx.clip();
  if(p.kind==='rings'){          // LOUD — big halftone bubbles drifting behind the dots
    [[PARA_FAR,120,0],[PARA_NEAR,72,1]].forEach(([d,r,li])=>{
      ctx.fillStyle=p.cols[li];
      for(let i=-1;i<=4;i++){ const cx=i*200+70-ox*d, cy=gy*(li?0.62:0.3);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,6.28); ctx.fill(); }
    });
  } else if(p.kind==='clouds'){  // DOODLE — biro clouds on the page
    [[PARA_FAR,1,0],[PARA_NEAR,.66,1]].forEach(([d,s,li])=>{
      ctx.fillStyle=p.cols[li];
      for(let i=-1;i<=4;i++){ const cx=i*215+60-ox*d, cy=gy*(li?0.5:0.2);
        [[0,0,32],[28,7,24],[-28,7,22]].forEach(([dx,dy,r])=>{
          ctx.beginPath(); ctx.arc(cx+dx*s,cy+dy*s,r*s,0,6.28); ctx.fill(); });
      }
    });
  } else if(p.kind==='hills'){   // INKWELL / PLASTICINE — rolling distance
    // TRANSLATE the silhouette; phase-shifting the sine only wobbles it vertically,
    // because the wavelength (~700px) dwarfs the shift.
    [[PARA_FAR,150,0],[PARA_NEAR,86,1]].forEach(([d,h,li])=>{
      ctx.save(); ctx.translate(-ox*d,0);
      ctx.fillStyle=p.cols[li]; ctx.beginPath(); ctx.moveTo(-140,gy);
      for(let x=-140;x<=W+140;x+=12){ const t2=x*0.009;
        ctx.lineTo(x, gy - h*0.55 - Math.sin(t2)*h*0.32 - Math.sin(t2*2.3+1.7)*h*0.14); }
      ctx.lineTo(W+140,gy); ctx.closePath(); ctx.fill();
      ctx.restore();
    });
  }
  ctx.restore();
}
function drawBg(){
  // Order matters: base fill -> PARALLAX -> the surface texture (dots / rule lines), so
  // the distance sits *behind* the paper it's drawn on rather than blotting it out.
  if(T.bg==='halftone'){ ctx.fillStyle=T.bgBase; ctx.fillRect(0,0,W,GROUND_Y);
    drawParallax();
    if(patHalftone){ctx.fillStyle=patHalftone;ctx.fillRect(0,0,W,GROUND_Y);} }
  else if(T.bg==='paper'){ ctx.fillStyle=T.bgBase; ctx.fillRect(0,0,W,GROUND_Y);
    drawParallax();
    ctx.strokeStyle=T.rule; ctx.lineWidth=1.4; for(let y=30;y<GROUND_Y;y+=26){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.strokeStyle=T.margin; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(34,0); ctx.lineTo(34,GROUND_Y); ctx.stroke(); }
  else if(T.bg==='inkpaper'){ ctx.fillStyle=T.bgBase; ctx.fillRect(0,0,W,GROUND_Y); drawParallax(); }
  else if(T.bg==='clay'){ const g=ctx.createLinearGradient(0,0,0,GROUND_Y); g.addColorStop(0,T.bgTop); g.addColorStop(1,T.bgBot); ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND_Y); drawParallax(); }

  if(T.bg==='paper'){ ctx.strokeStyle=T.groundEdge; ctx.lineWidth=3; ctx.beginPath(); for(let x=0;x<=W;x+=12){ctx.lineTo(x,GROUND_Y+(x%24?3:-2));} ctx.stroke(); }
  drawBranch();
}

function drawLanes(t,opts){

    ctx.fillStyle=(dim&&!sel)?'rgba(255,255,255,.72)':'#fff'; ctx.fillText(label,nx,ny);
    ctx.textBaseline='alphabetic';
  }
}

  return [{id:'easy',label:DIFFS.easy.label,x:x0,y,w,h},{id:'normal',label:DIFFS.normal.label,x:x0+w+gap,y,w,h}]; }
function diffChipAt(x,y){ for(const c of diffChips()){ if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h)return c.id; } return null; }
function drawDiffToggle(){
  const cs=diffChips(), x0=cs[0].x-12, x1=cs[1].x+cs[1].w+12;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.55)'; rr(x0,cs[0].y-22,x1-x0,cs[0].h+32,14); ctx.fill();
  for(const c of cs){ const on=c.id===diffId;
    ctx.fillStyle=on?T.border:'rgba(255,255,255,.10)'; rr(c.x,c.y,c.w,c.h,9); ctx.fill();
    ctx.strokeStyle=on?T.accent:'rgba(255,255,255,.3)'; ctx.lineWidth=on?2.5:1.5; rr(c.x,c.y,c.w,c.h,9); ctx.stroke();
    ctx.fillStyle=on?'#fff':'rgba(255,255,255,.75)'; ctx.font='700 12px system-ui,sans-serif'; ctx.fillText(c.label,c.x+c.w/2,c.y+c.h/2); }
  ctx.fillStyle='#fff'; ctx.globalAlpha=.7; ctx.font='700 10px system-ui,sans-serif';
  ctx.fillText('DIFFICULTY  ·  '+DIFFS[diffId].lives+' lives',W/2,cs[0].y-11); ctx.globalAlpha=1;
}
// Same lanes, same PLAY button — game over is the menu with your score on it.
function drawOver(){
  const t=(Date.now()%100000)/1000;
  drawLanes(t,{wipe:null,dim:true});
  drawParticles();
  ctx.save(); ctx.translate(W/2,Math.round(H*0.22));
  ctx.fillStyle='rgba(0,0,0,.72)'; rr(-190,-62,380,124,18); ctx.fill();
  ctx.strokeStyle='#ff5a5a'; ctx.lineWidth=4; rr(-190,-62,380,124,18); ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font='900 italic 36px "Arial Black",Impact,sans-serif';
  ctx.lineWidth=7; ctx.strokeStyle='#000'; ctx.strokeText('GAME OVER',0,-6);
  ctx.fillStyle='#ff5a5a'; ctx.fillText('GAME OVER',0,-6);
  ctx.font='900 22px "Arial Black",Impact,sans-serif'; ctx.fillStyle='#ffe022';
  ctx.fillText('Score '+Math.floor(score),0,26);
  ctx.font='700 12px system-ui,sans-serif'; ctx.fillStyle='#fff';
  ctx.fillText('best combo x'+comboBestRun+'  ·  best score '+best,0,48);
  ctx.restore();
  // what the run actually earned you — the reason to go again
  const ty=Math.round(H*0.316);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.7)'; rr(W/2-150,ty-19,300,38,19); ctx.fill();
  ctx.strokeStyle='#ffd93d'; ctx.lineWidth=2; rr(W/2-150,ty-19,300,38,19); ctx.stroke();
  ctx.fillStyle='#ffd93d'; ctx.font='900 17px "Arial Black",Impact,sans-serif';
  ctx.fillText('+'+runCoins+' 🍌 earned'+(dailyPaid?'  (incl. +25 daily)':''),W/2,ty-4);
  ctx.fillStyle='rgba(255,255,255,.75)'; ctx.font='700 10px system-ui,sans-serif';
  ctx.fillText('purse: '+coins+' 🍌',W/2,ty+12);
  if(rankUpTo){ // crossing a rank is the milestone worth celebrating
    const py=Math.round(H*0.40), pulse=.5+.5*Math.sin(Date.now()/220);
    ctx.globalAlpha=.85+.15*pulse;
    ctx.fillStyle='rgba(255,217,61,.2)'; rr(W/2-140,py-20,280,40,20); ctx.fill();
    ctx.strokeStyle='#ffd93d'; ctx.lineWidth=2.5; rr(W/2-140,py-20,280,40,20); ctx.stroke();
    ctx.fillStyle='#ffd93d'; ctx.font='900 15px "Arial Black",Impact,sans-serif';
    ctx.fillText('⬆ NEW RANK: '+rankUpTo.icon+' '+rankUpTo.name,W/2,py);
    ctx.globalAlpha=1;
  }
  drawPlayBtn('▶ AGAIN');
  drawShopBtn();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.6)'; rr(W/2-118,laneNameY()-46,236,24,12); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='700 12px system-ui,sans-serif';
  ctx.fillText('👆 tap a lane to change the look',W/2,laneNameY()-34);
  ctx.textBaseline='alphabetic';
  drawCtrlToggle(); drawDiffToggle();
}
function drawBoss(){ const x=boss.bx,y=boss.by; const col=boss.hitFlash>0?'#ffffff':T.monkeyBody;
  const roar=boss.roarT>0, weak=boss.weakT>0, dying=boss.deathT>0;
  const sc=roar?1.16:1, yOff=boss.slamHit>0?18*(boss.slamHit/.28):0;
  if(weak){ ctx.save(); ctx.globalAlpha=.32+.3*Math.abs(Math.sin(boss.wob)); ctx.fillStyle=T.fart; ctx.beginPath(); ctx.arc(x,y,74,0,6.28); ctx.fill(); ctx.restore(); }
  ctx.save(); ctx.translate(x,y+yOff); if(dying)ctx.rotate(boss.wob*.5); ctx.scale(sc,sc); ctx.translate(-x,-y);
  if(!dying){ ctx.strokeStyle=col; ctx.lineWidth=13; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x-48,BRANCH_Y+2); ctx.lineTo(x-26,y-28); ctx.moveTo(x+48,BRANCH_Y+2); ctx.lineTo(x+26,y-28); ctx.stroke(); }
  ell(x-30,y-30,15,15,T.ear); ell(x+30,y-30,15,15,T.ear);
  ell(x,y+28,44,32,col); ell(x,y-24,36,30,col); ell(x,y-19,23,19,T.monkeyFace);
  if(T.highlight){ctx.beginPath();ctx.ellipse(x-16,y-34,10,5,0,0,6.28);ctx.fillStyle='rgba(255,255,255,.25)';ctx.fill();}
  drawEyes(x-12,y-22,x+12,y-22, weak||dying);
  ctx.strokeStyle=T.outlineW>0?T.outline:'#3a2a18'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-20,y-32); ctx.lineTo(x-6,y-27); ctx.moveTo(x+20,y-32); ctx.lineTo(x+6,y-27); ctx.stroke();
  if(roar||weak){ ctx.fillStyle='#3a0f12'; ctx.beginPath(); ctx.ellipse(x,y-5,15,13,0,0,6.28); ctx.fill(); ctx.fillStyle='#ff6b9a'; ctx.beginPath(); ctx.ellipse(x,y,8,6,0,0,6.28); ctx.fill(); }
  ell(x-22,y+42,20,17,col); ell(x+22,y+42,20,17,col);
  ctx.strokeStyle=themeId==='ink'?'#4a4038':(T.outlineW>0?T.outline:'rgba(70,45,22,.55)'); ctx.lineWidth=Math.max(3,T.outlineW); ctx.beginPath(); ctx.moveTo(x,y+26); ctx.lineTo(x,y+58); ctx.stroke();
  const cw=54,cx=x-cw/2,cy=y-58; ctx.fillStyle='#ffd700'; ctx.strokeStyle='#b8860b'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy+18); ctx.lineTo(cx,cy+2); ctx.lineTo(cx+cw*.25,cy+12); ctx.lineTo(cx+cw*.5,cy-6); ctx.lineTo(cx+cw*.75,cy+12); ctx.lineTo(cx+cw,cy+2); ctx.lineTo(cx+cw,cy+18); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(boss.chargeT>0&&!weak){ ctx.globalAlpha=.65; ctx.fillStyle=T.fart; for(let k=0;k<6;k++){ctx.beginPath();ctx.arc(x+Math.sin(k*1.5)*18,y+62+k*5,15-k*1.6,0,6.28);ctx.fill();} ctx.globalAlpha=1; ctx.fillStyle='#ff5a5a'; ctx.font=T.hudFont(22); ctx.fillText('!!',x,y-78); }
  if(boss.slamT>0){ ctx.fillStyle='#ff5a5a'; ctx.font=T.hudFont(20); ctx.fillText('▼ SLAM ▼',x,y-78); }
  if(roar){ ctx.fillStyle='#ff5a5a'; ctx.font=T.titleFont(22); ctx.fillText('ROAAR!',x,y-84); }
  if(weak){ ctx.fillStyle=T.accent; ctx.font=T.hudFont(11); for(let k=0;k<3;k++){const a=boss.wob+k*2.1;ctx.fillText('✦',x+Math.cos(a)*42,y-42+Math.sin(a)*10);} ctx.font=T.hudFont(13); ctx.fillText('HIT THE WEAK POINT!',x,y-84); } }
function drawLevelDone(){ panel(W/2-180,H/2-120,360,240);
  drawTitle('LEVEL '+level+'!',W/2,H/2-56,34,T.fart);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle=T.text; ctx.font=T.hudFont(17); ctx.fillText('Cleared! 🍌',W/2,H/2-16);
  ctx.fillStyle=T.accent; ctx.font=T.hudFont(15); ctx.fillText(level>=9?'⚠ BOSS is next!':('Get ready for Level '+(level+1)),W/2,H/2+16);
  ctx.fillStyle=T.text; ctx.globalAlpha=.85; ctx.font=T.hudFont(13); ctx.fillText('Score '+Math.floor(score)+'  ·  ❤ '+lives,W/2,H/2+44); ctx.globalAlpha=1;
  if(Math.floor(Date.now()/500)%2===0){ ctx.fillStyle=T.text; ctx.font=T.titleFont(16); ctx.fillText('Tap to continue',W/2,H/2+88); } }
function drawWin(){ ctx.save(); if(shakeT>0)ctx.translate(R(-1,1)*shakeMag*shakeT,R(-1,1)*shakeMag*shakeT); drawBg(); drawParticles(); ctx.restore();
  ctx.save(); ctx.translate(0,SY);
  panel(W/2-200,78,400,524);
  drawTitle('YOU WIN!',W/2,150,40,T.banana);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle=T.text; ctx.font=T.hudFont(18);
  ctx.fillText('You defeated the',W/2,196); ctx.fillText('BOSS MONKEY! 🦍',W/2,222);
  ctx.fillStyle=T.fart; ctx.font=T.titleFont(25); ctx.fillText('💰 $10 ADDED TO',W/2,298); ctx.fillText('YOUR BANK! 💰',W/2,334);
  ctx.fillStyle=T.accent; ctx.font=T.hudFont(18); ctx.fillText('Amazing job! ⭐',W/2,392);
  ctx.fillStyle=T.text; ctx.font=T.hudFont(15); ctx.fillText('Final score '+Math.floor(score),W/2,428);
  if(Math.floor(Date.now()/500)%2===0){ ctx.fillStyle=T.text; ctx.font=T.hudFont(14); ctx.fillText('Tap to play again',W/2,564); }
  ctx.restore(); }

// ============================================================
// MAIN
// ============================================================
function draw(){
  ctx.clearRect(0,0,W,H);
  if(st===ST.SPLASH){drawSplash();return;}
  if(st===ST.SHOP){drawShop();return;}
  if(st===ST.START){drawStart();return;}
  if(st===ST.OVER){drawOver();return;}
  if(st===ST.WIN){drawWin();return;}
  ctx.save(); if(shakeT>0)ctx.translate(R(-1,1)*shakeMag*shakeT,R(-1,1)*shakeMag*shakeT);
  drawBg(); for(const c of clouds)drawCloud(c); for(const m of monkeys)drawLaser(m); for(const m of monkeys)drawMonkey(m); if(boss)drawBoss(); for(const p of peels)drawPeel(p); for(const g of groundBananas)drawGroundBanana(g); for(const c of coinsOnGround)drawCoin(c); for(const pu of powerups)drawPowerup(pu); for(const b of bananas)drawBanana(b); drawPlayer(); for(const fc of fartClouds)drawFartCloud(fc); drawParticles(); drawFloaters(); drawPops(); drawOverlay();
  ctx.restore();
  if(P.slowT>0){ ctx.globalAlpha=.1; ctx.fillStyle=PU_COLORS.plug; ctx.fillRect(0,0,W,CTRL_TOP); ctx.globalAlpha=1; }
  drawHUD(); drawEffectPips(); drawControls();
  if(st===ST.LEVELDONE)drawLevelDone();
  if(st===ST.PAUSE)drawPause();
  if(flashT>0){ ctx.globalAlpha=Math.min(.28,flashT); ctx.fillStyle=flashCol; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
}
function loop(ts){ const dt=Math.min((ts-lastTs)/1000,.05); lastTs=ts; if(hitstop>0){hitstop-=dt;}else{update(dt);} draw(); requestAnimationFrame(loop); }
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
