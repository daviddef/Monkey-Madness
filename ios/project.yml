name: MonkeyMadness
options:
  bundleIdPrefix: com.daviddef
  createIntermediateGroups: true
targets:
  MonkeyMadness:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.monkeymadness
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        # >>> Set this to your 10-character Apple Developer Team ID (developer.apple.com -> Membership).
        #     This is NOT the API Key ID or Issuer ID. Without it, archives fail with "No Team Found".
        # DEVELOPMENT_TEAM: XXXXXXXXXX
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Monkey Madness
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
