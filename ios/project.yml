name: MonkeyMadness
options:
  bundleIdPrefix: com.daviddef
  createIntermediateGroups: true
targets:
  MonkeyMadness:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.monkeymadness
        MARKETING_VERSION: "2.1"
        CURRENT_PROJECT_VERSION: "13"
        # iPhone only. The game is portrait and phone-shaped, and has never been run on an
        # iPad — shipping a device nobody has played it on invites a rejection for being a
        # stretched phone app. iPad can come back as a real, tested update.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L9SAXP2E2W
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Monkey Fart Madness
        # without these, xcodegen writes literal 1.0/1 defaults and the MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION settings above are silently ignored — every archive then
        # ships as build 1 and App Store Connect rejects it as a duplicate.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # The game uses no encryption beyond what iOS itself provides (no networking at
        # all), so it's exempt. Declaring it here skips the export-compliance prompt that
        # otherwise blocks every TestFlight build from reaching testers.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
