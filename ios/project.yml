name: MonkeyMadness
options:
  bundleIdPrefix: com.daviddef
  createIntermediateGroups: true
targets:
  MonkeyMadness:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.monkeymadness
        MARKETING_VERSION: "2.2"
        CURRENT_PROJECT_VERSION: "14"
        # iPhone + iPad. iPad is back, and this time it's actually been run on one: the
        # canvas scales uniformly (min of the two axes), so the play field is a centred
        # portrait column with the theme's own background either side — scaled, never
        # stretched, and never distorted.
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L9SAXP2E2W
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Monkey Fart Madness
        # without these, xcodegen writes literal 1.0/1 defaults and the MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION settings above are silently ignored — every archive then
        # ships as build 1 and App Store Connect rejects it as a duplicate.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # The game uses no encryption beyond what iOS itself provides (no networking at
        # all), so it's exempt. Declaring it here skips the export-compliance prompt that
        # otherwise blocks every TestFlight build from reaching testers.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
